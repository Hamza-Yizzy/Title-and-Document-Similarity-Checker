<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Title - Similarity Checker</title>
    <style>
        /* General body styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(120deg, #74b9ff, #a29bfe); /* Gradient background */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }

        /* Container styling */
        .container {
            width: 100%;
            max-width: 500px;
            margin: 20px;
            background-color: #f9f9f9; /* Light grey background for container */
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        /* Heading styling */
        h1 {
            text-align: center;
            color: #333;
            font-size: 2em;
            margin-bottom: 20px;
        }

        /* Input field styling */
        input[type="text"] {
            width: 93%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ddd;
            font-size: 1em;
            color: #333;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #0056b3;
        }

        /* Button styling */
        .btn {
            padding: 12px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 1.1em;
            transition: background-color 0.3s ease;
            margin-top: 15px;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        /* Back button styling */
        .btn-back {
            background-color: #6c757d;
            margin-top: 10px;
        }

        .btn-back:hover {
            background-color: #5a6268;
        }

        /* Message styling */
        .message {
            font-size: 1.1em;
            text-align: center;
            color: #333;
            margin-top: 20px;
            background-color: #f1f1f1;
            padding: 10px;
            border-radius: 5px;
        }

        /* Responsive design for smaller screens */
        @media (max-width: 768px) {
            .container {
                width: 80%;
                padding: 20px;
            }

            h1 {
                font-size: 1.5em;
            }

            .btn {
                font-size: 1em;
            }
        }

        /* Logout Icon */
        .logout-icon {
            position: absolute;
            top: 20px;
            left: 20px; /* Logout icon now on the left side */
            font-size: 24px;
            color: #ffffff;
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>
<body>

<!-- Logout Icon -->
<a href="{% url 'logout' %}" class="logout-icon">
    <i class="fas fa-sign-out-alt"></i> <!-- FontAwesome logout icon -->
</a>

<div class="container">
    <h1>Check Book Title</h1>

    <form method="POST">
        {% csrf_token %}
        <label for="title">Enter Book Title:</label>
        <input type="text" id="title" name="title" required placeholder="Enter a book title">
        <button type="submit" class="btn">Check Title</button>
    </form>

    {% if message %}
        <div class="message">{{ message }}</div>
    {% endif %}

    <!-- Back Button -->
    <a href="{% url 'dashboard' %}">
        <button type="button" class="btn btn-back">Back to Dashboard</button>
    </a>
</div>

</body>
</html>
