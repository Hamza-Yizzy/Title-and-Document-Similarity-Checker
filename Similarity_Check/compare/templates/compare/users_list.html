{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Users List</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
  <h1 class="text-3xl font-bold text-gray-800 mb-6">👥 Registered Users</h1>

  <table class="min-w-full bg-white rounded-lg overflow-hidden shadow">
    <thead class="bg-blue-600 text-white">
      <tr>
        <th class="py-3 px-6 text-left">Username</th>
        <th class="py-3 px-6 text-left">Email</th>
        <th class="py-3 px-6 text-left">Is Superuser</th>
        <th class="py-3 px-6 text-left">Date Joined</th>
      </tr>
    </thead>
    <tbody>
      {% for user in users %}
      <tr class="border-b hover:bg-gray-50">
        <td class="py-3 px-6">{{ user.username }}</td>
        <td class="py-3 px-6">{{ user.email }}</td>
        <td class="py-3 px-6">{{ user.is_superuser }}</td>
        <td class="py-3 px-6">{{ user.date_joined|date:"Y-m-d" }}</td>
      </tr>
      {% empty %}
      <tr><td colspan="4" class="text-center py-4">No users found.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
