<!-- dashboard.html -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Similarity Checker</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet"> <!-- FontAwesome for logout icon -->
    <style>
        /* Full-page background image */
        body {
            background: url("{% static 'images/foc.png' %}") no-repeat center center fixed;
            background-size: cover;
            font-family: 'Arial', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.7); /* Semi-transparent background */
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
            margin-bottom: 20px;
        }

        .message p {
            font-size: 1.2rem;
            color: #f8f9fa;
            text-align: center;
            margin-bottom: 30px;
        }

        .btn-custom {
            background-color: #17a2b8;
            border: none;
            color: white;
            font-size: 1.1rem;
            padding: 12px 25px;
            border-radius: 50px;
            transition: all 0.3s ease;
            display: block;
            width: 100%;
            margin-bottom: 15px;
        }

        .btn-custom:hover {
            background-color: #138496;
            color: #fff;
            transform: scale(1.05);
        }

        .button-container {
            text-align: center;
        }

        footer {
            text-align: center;
            color: #f8f9fa;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .logout-icon {
            position: absolute;
            top: 20px;
            left: 20px;  /* Moved from right to left */
            font-size: 24px;
            color: #fff;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Welcome to Similarity Checker System</h1>

    <div class="message">
        <p>Please choose an option to proceed</p>
    </div>

    <div class="button-container">
        <form action="{% url 'check_title' %}" method="GET">
            <button type="submit" class="btn btn-custom">Check Title</button>
        </form>
        <form action="{% url 'index' %}" method="GET">
            <button type="submit" class="btn btn-custom">Check Document</button>
        </form>
    </div>

    <footer>
        &copy; 2024 Faculty of Computing | All Rights Reserved
    </footer>
</div>

<!-- Logout Icon -->
<a href="{% url 'logout' %}" class="logout-icon">
    <i class="fas fa-sign-out-alt"></i> <!-- FontAwesome logout icon -->
</a>

<!-- Bootstrap JS (Optional, if you need interactive components) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
