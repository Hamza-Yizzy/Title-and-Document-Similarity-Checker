<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Similarity Checker</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet"> <!-- FontAwesome for logout icon -->
    <style>
        body {
            background: linear-gradient(120deg, #74b9ff, #a29bfe); /* Smooth, subtle gradient */
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* Register Button Style */
        .register-btn {
            position: absolute;
            top: 30px; /* Adjusted the top distance */
            right: 20px;
            background-color: #007bff;
            color: #fff;
            padding: 8px 16px;
            border-radius: 5px;
            text-decoration: none;
            z-index: 5;
        }

        .register-btn:hover {
            background-color: #0056b3;
            color: #fff;
        }

        /* Logout Icon */
        .logout-icon {
            position: absolute;
            top: 30px; /* Adjusted the top distance */
            left: 20px; /* Moved the logout icon to the left side */
            font-size: 24px;
            color: #ffffff;
            cursor: pointer;
            z-index: 10;
        }

        .container {
            max-width: 700px;
            background-color: #ffffff; /* White background for container */
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
            padding: 30px;
            position: relative;
            transition: all 0.3s ease-in-out;
        }

        .container:hover {
            box-shadow: 0px 6px 25px rgba(0, 0, 0, 0.15); /* Subtle hover effect */
        }

        h1 {
            text-align: center;
            font-size: 2.2rem;
            color: #333;
            margin-bottom: 20px;
        }

        .upload-btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .upload-btn-container label {
            background-color: #28a745;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            text-align: center;
            transition: background-color 0.3s ease;
        }

        .upload-btn-container label:hover {
            background-color: #218838;
        }

        input[type="file"] {
            display: none;
        }

        textarea {
            width: 100%;
            height: 200px;
            margin-top: 15px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            resize: vertical;
            font-size: 1rem;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.1); /* Soft shadow effect */
        }

        .btn {
            margin-top: 10px;
            width: 100%;
            border-radius: 5px;
        }

        .message {
            color: red;
            margin-top: 10px;
            font-size: 1rem;
            text-align: center;
        }

        /* Button Colors */
        .btn-primary {
            background-color: #0984e3;
            border: none;
            transition: background-color 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #74b9ff;
        }

        .btn-secondary {
            background-color: #636e72;
            border: none;
            transition: background-color 0.3s ease;
        }

        .btn-secondary:hover {
            background-color: #b2bec3;
        }
    </style>
</head>
<body>

<!-- Logout Icon -->
<a href="{% url 'logout' %}" class="logout-icon">
    <i class="fas fa-sign-out-alt"></i> <!-- FontAwesome logout icon -->
</a>

<!-- Register Book Button (Outside the Container) -->
<a href="{% url 'books_list' %}" class="register-btn">Register New Book</a>

<div class="container">
    <h1 class="text-center">Document Similarity Checker</h1>

    <!-- File Upload -->
    <form id="uploadForm" method="POST" enctype="multipart/form-data" action="{% url 'compare_uploaded_books' %}">
        {% csrf_token %}
        <div class="upload-btn-container">
            <label for="fileInput">Upload File</label>
            <input type="file" id="fileInput" name="file1" accept=".pdf,.docx">
        </div>

        <!-- Textarea for Extracted Content -->
        <textarea id="fileContent" name="file_content" placeholder="Extracted content will appear here..." readonly></textarea>

        <!-- Message Display -->
        <div id="message" class="message"></div>

        <!-- Check Button -->
        <button type="submit" class="btn btn-primary" id="checkButton">Check</button>

        <!-- Back to Dashboard Button -->
        <a href="{% url 'dashboard' %}" class="btn btn-secondary mt-2">Back to Dashboard</a>
    </form>
</div>

<!-- JavaScript to Automatically Extract File Content -->
<script>
    document.getElementById('fileInput').addEventListener('change', function(event) {
        const fileInput = document.getElementById('fileInput');
        const fileContent = document.getElementById('fileContent');
        const message = document.getElementById('message');
        const formData = new FormData();

        if (fileInput.files.length === 0) {
            message.textContent = "Please select a file.";
            return;
        }

        const file = fileInput.files[0];
        const allowedExtensions = ['pdf', 'docx'];
        const fileExtension = file.name.split('.').pop().toLowerCase();

        // Validate file extension
        if (!allowedExtensions.includes(fileExtension)) {
            message.textContent = "Unauthorized file extension. Only PDF and DOCX files are allowed.";
            fileInput.value = "";
            return;
        }

        formData.append('file', file);

        // Send the file to the server for extraction
        fetch("{% url 'handle_uploaded_file' %}", {
            method: 'POST',
            body: formData,
            headers: {
                'X-CSRFToken': '{{ csrf_token }}'
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.file_content) {
                fileContent.value = data.file_content; // Show extracted content
                message.textContent = ""; // Clear any error message
            } else {
                message.textContent = data.error || "Failed to extract file content.";
            }
        })
        .catch(error => {
            console.error('Error:', error);
            message.textContent = "An error occurred while processing the file.";
        });
    });
</script>

</body>
</html>
